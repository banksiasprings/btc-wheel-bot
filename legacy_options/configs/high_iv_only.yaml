# HYPOTHESIS: IV rank as a quality gate — only sell premium when IV rank > 0.70.
# The idea: most wheel losses come from selling cheap options in quiet markets and
# getting punished when vol finally spikes. By waiting for genuinely elevated IV,
# every premium collected is larger AND the subsequent vol mean-reversion helps P&L.
# Expected: fewer trades than most bots, but higher per-trade premium and better
# risk-adjusted returns. If this beats the evolved baseline, IV selection is the key lever.
_meta:
  name: high_iv_only
  created_at: '2026-05-22T00:00:00+00:00'
  source: thesis
  status: paper
  goal: null
  fitness: null
  notes: 'Only sells when IV rank > 0.70. Hypothesis: IV selectivity improves risk-adjusted
    returns by ensuring every trade has elevated premium and benefits from vol mean-reversion.'
backtest:
  approx_otm_offset: 0.0338
  lookback_months: 12
  premium_fraction_of_spot: 0.0289
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  starting_equity: 100000.0
  transaction_cost: 0.5
deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
execution:
  order_confirm_timeout: 30
  poll_interval: 60
  slippage_tolerance: 0.005
hedge:
  enabled: true
  rebalance_threshold: 0.05
logging:
  level: INFO
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv
overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.05
  enabled: true
  iv_spike_warning_threshold: 0.90
risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.4
  max_daily_drawdown: 0.1
  max_loss_per_leg: 0.03
  roll_enabled: false
  roll_min_dte: 3
sizing:

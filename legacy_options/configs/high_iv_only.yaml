  expiry_preference:
  - weekly
  - monthly
  initial_cycle: put
  iv_dynamic_delta: true
  iv_rank_threshold: 0.70
  liquidity_top_n: 30
  max_dte: 30
  min_dte: 7
  target_delta_max: 0.35
  target_delta_min: 0.15

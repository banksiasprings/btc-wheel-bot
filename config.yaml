deribit:
  testnet: true
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  rest_url_mainnet: https://www.deribit.com/api/v2
  request_timeout: 10
  currency: BTC
strategy:
  iv_rank_threshold: 0.306
  target_delta_min: 0.1453
  target_delta_max: 0.2222
  expiry_preference:
  - weekly
  - monthly
  min_dte: 11
  max_dte: 18
  initial_cycle: put
  expiry_execution_hour: 8
  liquidity_top_n: 100
sizing:
  max_equity_per_leg: 0.1182
  max_open_legs: 1
  collateral_buffer: 1.0
  min_free_equity_fraction: 0.25
  contract_size_btc: 0.1
  use_regime_filter: false
  regime_ma_days: 50
risk:
  max_adverse_delta: 0.4
  max_loss_per_leg: 0.02
  max_daily_drawdown: 0.1
  kill_switch_file: KILL_SWITCH
execution:
  poll_interval: 60
  order_confirm_timeout: 30
  slippage_tolerance: 0.005
backtest:
  starting_equity: 10000.0
  lookback_months: 12
  transaction_cost: 0.5
  approx_otm_offset: 0.1168
  premium_fraction_of_spot: 0.0193
  risk_free_rate: 0.04
  results_image: backtest_results.png
  results_csv: data/backtest_trades.csv
overseer:
  enabled: true
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.05
  iv_spike_warning_threshold: 0.85
logging:
  level: INFO
  rotation: 1 day
  retention: 30 days
  log_dir: logs
  trade_log_csv: data/trades.csv

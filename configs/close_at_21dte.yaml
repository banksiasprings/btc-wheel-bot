# HYPOTHESIS: The classic options rule — enter at ~40 DTE, close/roll when 21 DTE
# remains. The theory: theta decay is front-loaded (you've captured ~50% of premium
# by 21 DTE), while gamma risk accelerates sharply in the final 3 weeks. Closing early
# should reduce large blowout losses even if it sacrifices the last drip of theta.
# Comparison point: does the 21 DTE exit improve or hurt Sharpe vs the baseline?
# If it helps: gamma avoidance is worth the premium left on the table.
# If it hurts: BTC IV is mean-reverting fast enough that riding to expiry wins.
_meta:
  name: close_at_21dte
  created_at: '2026-05-22T00:00:00+00:00'
  source: thesis
  status: paper
  goal: null
  fitness: null
  notes: 'Enter at 40-45 DTE, roll/close at 21 DTE. Hypothesis: early exit avoids
    gamma blowups and captures the best theta-per-risk portion of the option lifecycle.'
backtest:
  approx_otm_offset: 0.0338
  lookback_months: 12
  premium_fraction_of_spot: 0.0289
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  starting_equity: 100000.0
  transaction_cost: 0.5
deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
execution:
  order_confirm_timeout: 30
  poll_interval: 60
  slippage_tolerance: 0.005
hedge:
  enabled: true
  rebalance_threshold: 0.05
logging:
  level: INFO
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv
overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.05
  enabled: true
  iv_spike_warning_threshold: 0.85
risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.4
  max_daily_drawdown: 0.1
  max_loss_per_leg: 0.03
  roll_enabled: true
  roll_min_dte: 21
sizing:

  contract_size_btc: 0.1
  ladder_enabled: false
  ladder_legs: 2
  max_equity_per_leg: 0.10
  max_open_legs: 2
  min_free_equity_fraction: 0.10
  regime_ma_days: 50
  use_regime_filter: false
strategy:
  expiry_execution_hour: 8
  expiry_preference:
  - monthly
  - weekly
  initial_cycle: put
  iv_dynamic_delta: true
  iv_rank_threshold: 0.35
  liquidity_top_n: 30
  max_dte: 45
  min_dte: 28
  target_delta_max: 0.40
  target_delta_min: 0.18

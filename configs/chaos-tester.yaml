_meta:
  created_at: '2026-04-25T03:10:00.000000+00:00'
  fitness: null
  goal: "Stress-test bot: bypasses IV rank, shortest expiries, trades as fast as possible"
  name: chaos-tester
  notes: "TEST ONLY — iv_rank_threshold=0, min_dte=1, max_dte=7, poll every 30s.
    Purpose: fire real paper trades quickly to verify trade logging, TradingView
    overlays, farm metrics, and P&L accounting end-to-end. Not a production config."
  source: manual
  status: paper
backtest:
  approx_otm_offset: 0.05
  lookback_months: 12
  premium_fraction_of_spot: 0.02
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  # $100k so 1 contract (~$7.7k at current BTC price) is well within limits
  starting_equity: 100000.0
  transaction_cost: 0.5
deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
execution:
  order_confirm_timeout: 30
  # Poll every 30 seconds instead of 60 — faster trade cycle
  poll_interval: 30
  slippage_tolerance: 0.01
hedge:
  enabled: false
  rebalance_threshold: 0.1
logging:
  level: DEBUG
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv
overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.2
  enabled: false
  iv_spike_warning_threshold: 0.99
risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.9
  max_daily_drawdown: 0.5
  max_loss_per_leg: 0.5
  roll_enabled: false
  roll_min_dte: 1
sizing:
  collateral_buffer: 1.0
  contract_size_btc: 0.1
  ladder_enabled: false
  ladder_legs: 1
  # 10% per leg on $100k = $10k per leg, well above 1-contract minimum (~$7.7k)
  max_equity_per_leg: 0.1
  max_open_legs: 1
  min_free_equity_fraction: 0.02
  regime_ma_days: 50
  use_regime_filter: false
strategy:
  expiry_execution_hour: 8
  expiry_preference:
  - weekly
  - monthly
  initial_cycle: put
  # Disable IV-based delta adjustment — use fixed range
  iv_dynamic_delta: false
  # KEY: threshold=0 means IV rank check always passes — bot enters immediately
  iv_rank_threshold: 0.0
  liquidity_top_n: 200
  # Very short DTE so options expire quickly and cycle restarts
  max_dte: 7
  min_dte: 1
  # Wider delta range to maximise chance of finding a qualifying instrument
  target_delta_max: 0.5
  target_delta_min: 0.2

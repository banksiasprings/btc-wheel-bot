# HYPOTHESIS: The RL agent's current risk limits are a conservative harness — widening
# them will reveal whether the model has genuine edge or was just risk-constrained into
# appearing profitable. With max_daily_drawdown=0.20, max_adverse_delta=0.80, and
# max_loss_per_leg=0.10, the agent gets real room to act on its policy. Two outcomes:
#   A) RL outperforms rl-agent-v1 => the tight limits were strangling a capable policy
#   B) RL blows up faster => the current limits are doing real protective work
# Either result is a clear signal. This is the fastest way to stress-test the model.
_meta:
  name: rl_agent_stress
  created_at: '2026-05-22T00:00:00+00:00'
  source: manual
  status: paper
  goal: null
  fitness: null
  notes: 'Same PPO model as rl-agent-v1 but with relaxed risk guardrails. Hypothesis:
    tight limits in v1 may be masking model capability — or masking fragility. This
    exposes which.'

# ── RL-specific keys ──────────────────────────────────────────────────────────
strategy_type: rl_agent
rl_model_path: rl_agent/checkpoints/best_model.zip

# ── Standard config ───────────────────────────────────────────────────────────
backtest:
  approx_otm_offset: 0.0338
  lookback_months: 12
  premium_fraction_of_spot: 0.0289
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  starting_equity: 100000.0
  transaction_cost: 0.5
deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
execution:
  order_confirm_timeout: 30
  poll_interval: 60
  slippage_tolerance: 0.005
hedge:
  enabled: false
  rebalance_threshold: 0.05
logging:
  level: INFO
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv
overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.10
  enabled: true
  iv_spike_warning_threshold: 0.95
risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.80
  max_daily_drawdown: 0.20
  max_loss_per_leg: 0.10
  roll_enabled: false
  roll_min_dte: 2
sizing:
  collateral_buffer: 1.5
  contract_size_btc: 0.1
  ladder_enabled: false
  ladder_legs: 1
  max_equity_per_leg: 0.15
  max_open_legs: 1
  min_free_equity_fraction: 0.10
  regime_ma_days: 50
  use_regime_filter: false
strategy:
  expiry_execution_hour: 8
  expiry_preference:
  - weekly
  - monthly
  initial_cycle: put
  iv_dynamic_delta: false
  iv_rank_threshold: 0.0
  liquidity_top_n: 50
  max_dte: 14
  min_dte: 4
  target_delta_max: 0.45
  target_delta_min: 0.15

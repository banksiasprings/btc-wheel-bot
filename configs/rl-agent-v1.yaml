_meta:
  name: RL Agent V1
  status: paper
  source: manual
  goal: PPO RL agent trained on 1096 days real Deribit BTC data
  notes: "Sharpe 0.33, max_dd 5.35% on holdout. Actions: HOLD/SELL_PUT_020/SELL_PUT_025/SELL_CALL_020/CLOSE"
  created_at: '2026-05-22T00:00:00+00:00'

# ── RL-specific keys (read by bot.py; ignored by load_config()) ───────────────
strategy_type: rl_agent
rl_model_path: rl_agent/checkpoints/best_model.zip

# ── Deribit testnet order placement (off by default) ─────────────────────────
# Set to true AND fill in config/deribit_testnet.json with real testnet creds
# to have this bot submit real orders to test.deribit.com (fake BTC, real API).
# See deribit/TESTNET_SETUP.md for step-by-step instructions.
use_deribit_testnet: false

# ── Standard config (required by load_config()) ───────────────────────────────
backtest:
  approx_otm_offset: 0.0338
  lookback_months: 12
  premium_fraction_of_spot: 0.0289
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  starting_equity: 100000.0
  transaction_cost: 0.5

deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2

execution:
  order_confirm_timeout: 30
  poll_interval: 60
  slippage_tolerance: 0.005

hedge:
  enabled: false
  rebalance_threshold: 0.05

logging:
  level: INFO
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv

overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.05
  enabled: false
  iv_spike_warning_threshold: 0.85

risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.5
  max_daily_drawdown: 0.10
  max_loss_per_leg: 0.03
  roll_enabled: false
  roll_min_dte: 2

sizing:
  collateral_buffer: 1.5
  contract_size_btc: 0.1
  ladder_enabled: false
  ladder_legs: 1
  max_equity_per_leg: 0.10
  max_open_legs: 1
  min_free_equity_fraction: 0.10
  regime_ma_days: 50
  use_regime_filter: false

strategy:
  expiry_execution_hour: 8
  expiry_preference:
  - weekly
  - monthly
  initial_cycle: put
  iv_dynamic_delta: false
  iv_rank_threshold: 0.0
  liquidity_top_n: 50
  max_dte: 14
  min_dte: 4
  target_delta_max: 0.45
  target_delta_min: 0.15

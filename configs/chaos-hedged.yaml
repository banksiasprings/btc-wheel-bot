_meta:
  created_at: '2026-04-25T03:10:00.000000+00:00'
  fitness: null
  goal: 'Stress-test bot: same as chaos-tester but with delta-neutral hedge enabled'
  name: chaos-hedged
  notes: "TEST ONLY \u2014 identical to chaos-tester except hedge.enabled=true. Run\
    \ alongside chaos-tester to compare hedged vs unhedged P&L on identical market\
    \ conditions."
  source: manual
  status: paper
backtest:
  approx_otm_offset: 0.05
  lookback_months: 12
  premium_fraction_of_spot: 0.02
  results_csv: data/backtest_trades.csv
  results_image: backtest_results.png
  risk_free_rate: 0.04
  starting_equity: 100000.0
  transaction_cost: 0.5
deribit:
  currency: BTC
  request_timeout: 10
  rest_url_mainnet: https://www.deribit.com/api/v2
  rest_url_testnet: https://test.deribit.com/api/v2
  testnet: true
  ws_url_mainnet: wss://www.deribit.com/ws/api/v2
  ws_url_testnet: wss://test.deribit.com/ws/api/v2
execution:
  order_confirm_timeout: 30
  poll_interval: 90
  slippage_tolerance: 0.01
hedge:
  enabled: true
  rebalance_threshold: 0.05
logging:
  level: DEBUG
  log_dir: logs
  retention: 30 days
  rotation: 1 day
  trade_log_csv: data/trades.csv
overseer:
  check_interval_minutes: 60
  drawdown_warning_threshold: 0.2
  enabled: false
  iv_spike_warning_threshold: 0.99
risk:
  kill_switch_file: KILL_SWITCH
  max_adverse_delta: 0.9
  max_daily_drawdown: 0.5
  max_loss_per_leg: 0.5
  roll_enabled: false
  roll_min_dte: 1
sizing:
  collateral_buffer: 1.0
  contract_size_btc: 0.1
  ladder_enabled: false
  ladder_legs: 1
  max_equity_per_leg: 0.1
  max_open_legs: 1
  min_free_equity_fraction: 0.02
  regime_ma_days: 50
  use_regime_filter: false
strategy:
  expiry_execution_hour: 8
  expiry_preference:
  - weekly
  - monthly
  initial_cycle: put
  iv_dynamic_delta: false
  iv_rank_threshold: 0.0
  liquidity_top_n: 30
  max_dte: 7
  min_dte: 1
  target_delta_max: 0.5
  target_delta_min: 0.2

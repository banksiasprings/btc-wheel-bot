name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select=E,F --ignore=E501,E402 --exclude=mobile-app/

      - name: Run tests
        env:
          # Provide a minimal config so tests that import config don't fail
          WHEEL_API_KEY: test-key
        run: pytest tests/ -v --tb=short

  build-frontend:
    name: Build mobile app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install frontend deps
        working-directory: mobile-app
        run: npm ci

      - name: Build frontend
        working-directory: mobile-app
        run: npm run build

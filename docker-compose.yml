version: "3.9"

services:
  btc-wheel-bot:
    build: .
    image: btc-wheel-bot:latest
    container_name: btc-wheel-bot

    env_file:
      - .env          # copy .env.example to .env and fill in credentials

    volumes:
      - ./data:/app/data        # persist trade CSV and chart
      - ./logs:/app/logs        # persist log files
      - ./config.yaml:/app/config.yaml:ro

    command: ["--mode=paper"]   # change to --mode=live for real trading

    restart: unless-stopped

  # ── Backtest one-shot service ───────────────────────────────────────────────
  backtest:
    build: .
    image: btc-wheel-bot:latest
    container_name: btc-wheel-backtest
    profiles: ["backtest"]      # docker compose --profile backtest up

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro

    command: ["--mode=backtest"]
    restart: "no"

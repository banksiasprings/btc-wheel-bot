farm:
  status_interval_seconds: 60
  data_dir: farm

bots:
  - id: bot_0
    name: "Conservative"
    description: "Low delta, high IV threshold — safest config"
    base_config: config.yaml
    overrides:
      strategy:
        iv_rank_threshold: 0.60
        target_delta_min: 0.12
        target_delta_max: 0.25
      backtest:
        starting_equity: 10000.0

  - id: bot_1
    name: "Balanced"
    description: "Default balanced config"
    base_config: config.yaml
    overrides:
      strategy:
        iv_rank_threshold: 0.50
      backtest:
        starting_equity: 10000.0

  - id: bot_2
    name: "Aggressive"
    description: "Higher delta, lower IV threshold — more trades"
    base_config: config.yaml
    overrides:
      strategy:
        iv_rank_threshold: 0.35
        target_delta_min: 0.20
        target_delta_max: 0.40
      backtest:
        starting_equity: 10000.0

  - id: bot_3
    name: "Capital ROI"
    description: "Evolved config optimising for minimum capital ROI"
    base_config: config.yaml
    overrides:
      sizing:
        max_equity_per_leg: 0.08
        min_free_equity_fraction: 0.10
      backtest:
        starting_equity: 5000.0

readiness_thresholds:
  min_trades: 20
  min_days: 30
  min_sharpe: 0.8
  max_drawdown: 0.15
  min_win_rate: 0.55
  min_walk_forward_robustness: 0.75
  min_reconcile_accuracy: 0.80

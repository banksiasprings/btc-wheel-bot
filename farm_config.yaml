farm:
  status_interval_seconds: 60
  data_dir: farm

# Bots are now managed dynamically via the Pipeline tab.
# Set a config to 'paper' status in Pipeline → the farm supervisor starts a bot for it automatically.
# Set it to any other status (archive/draft) → the bot stops.
# No static bots should be listed here.
bots: []

readiness_thresholds:
  min_trades: 20
  min_days: 30
  min_sharpe: 0.8
  max_drawdown: 0.15
  min_win_rate: 0.55
  min_walk_forward_robustness: 0.75
  min_reconcile_accuracy: 0.80
